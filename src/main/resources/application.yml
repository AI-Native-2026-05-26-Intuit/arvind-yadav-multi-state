spring:
  jpa:
    hibernate:
      ddl-auto: validate            # (1) NEVER 'update' or 'create' in this curriculum
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false             # (2) prevent the lazy-load-in-view anti-pattern
    show-sql: false                 # flip to true for local debugging only
  application:
    name: multistate-service
  profiles:
    default: local
  datasource:
    # ─────────────────────────────────────────────────────────────────────
    # PREREQ — install Docker Desktop (or Rancher Desktop) once:
    #   https://www.docker.com/products/docker-desktop/
    # Confirm it's running:   docker ps
    #
    # BEFORE `./gradlew bootRun` — start Postgres on port 5433:
    #   docker run -d --name uc-postgres \
    #     -p 5433:5432 \
    #     -e POSTGRES_PASSWORD=devpass \
    #     -e POSTGRES_DB=postgres \
    #     postgres:16
    #
    # Verify it's up:   docker ps | grep uc-postgres
    # Tail logs:        docker logs -f uc-postgres
    # Stop + remove:    docker stop uc-postgres && docker rm uc-postgres
    # Restart later:    docker start uc-postgres   (data persists in the container)
    # ─────────────────────────────────────────────────────────────────────
    url: jdbc:postgresql://localhost:5433/postgres   # local Postgres container; 5432 is taken by an SSH tunnel
    username: postgres
    password: ${DB_PASSWORD:devpass}
    hikari:
      maximum-pool-size: 5
  data:
    mongodb:
      # ───────────────────────────────────────────────────────────────────
      # BEFORE `./gradlew bootRun` — start MongoDB on port 27017:
      #   docker run -d --name uc-mongo -p 27017:27017 mongo:7
      #
      # Verify:        docker ps | grep uc-mongo
      # Stop+remove:   docker stop uc-mongo && docker rm uc-mongo
      # Restart:       docker start uc-mongo
      # ───────────────────────────────────────────────────────────────────
      uri: mongodb://localhost:27017/multistate      # (1) placeholder; tests inject via @ServiceConnection
      auto-index-creation: true                      # (2) create @Indexed indexes on startup
    redis:
      # ───────────────────────────────────────────────────────────────────
      # BEFORE `./gradlew bootRun` — start Redis on port 6379:
      #   docker run -d --name uc-redis -p 6379:6379 redis:7-alpine
      #
      # Verify:        docker ps | grep uc-redis
      # Stop+remove:   docker stop uc-redis && docker rm uc-redis
      # Restart:       docker start uc-redis
      #
      # ── One-liner: start ALL THREE at once ─────────────────────────────
      #   docker run -d --name uc-postgres -p 5433:5432 \
      #       -e POSTGRES_PASSWORD=devpass -e POSTGRES_DB=postgres postgres:16 \
      #   && docker run -d --name uc-mongo -p 27017:27017 mongo:7 \
      #   && docker run -d --name uc-redis -p 6379:6379 redis:7-alpine
      #
      # ── Stop ALL THREE ────────────────────────────────────────────────
      #   docker stop uc-postgres uc-mongo uc-redis \
      #   && docker rm   uc-postgres uc-mongo uc-redis
      # ───────────────────────────────────────────────────────────────────
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 60000                             # (3) 60s TTL — short enough to bound staleness
      cache-null-values: false                        # (4) don't cache "not found"
  security:
    oauth2:
      resourceserver:
        jwt:
          # (1) Dummy IdP issuer for production wiring; tests override with a mock
          #     JwkSource via spring-security-test so they don't need a real IdP.
          issuer-uri: https://idp.example.internal/realms/uptimecrew
  kafka:
    bootstrap-servers: localhost:9092         # (1) overridden by @ServiceConnection in tests
    producer:
      acks: all
      properties:
        enable.idempotence: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Outbox payloads are already JSON strings (serialized inside AllocationService),
      # so we use a String serializer here to avoid double-encoding the body.
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: multistate-read-model-builder
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        # AllocationCreatedListener takes a raw String payload and does its own
        # Jackson parsing — so the delegate is StringDeserializer, not
        # JsonDeserializer. With the ErrorHandlingDeserializer wrapper, a
        # malformed payload still surfaces as a handler exception and lands in
        # the DLT instead of crashing the container.
        spring.deserializer.value.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: RECORD
  graphql:
    path: /graphql
    graphiql:
      enabled: true
      path: /graphiql
    schema:
      printer:
        enabled: true            # GET /graphql/schema returns the SDL for inspection
  ai:
    mcp:
      server:
        name: multistate-mcp
        version: 1.0.0
        type: SYNC
        transport: SSE
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:dummy}
      chat:
        options:
          model: claude-sonnet-4-5
          max-tokens: 1024



management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.uptimecrew.multistate: DEBUG     # turn up your own packages in local dev
    org.springframework.security: DEBUG  # logs the SecurityFilterChain being built at startup

# ── W3 D1: OpenAPI + Feign client + Resilience4j circuit breaker ───────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

identity:
  base-url: http://localhost:8090     # (1) WireMock stub address used by the contract test

resilience4j:
  circuitbreaker:
    instances:
      identity:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    # Testcontainers will inject a real URL at runtime; this is just a placeholder
    # so the bean wiring doesn't fail in test contexts that don't use a DB.
    url: jdbc:postgresql://placeholder:5432/test
    username: test
    password: test

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: INFO
    com.uptimecrew.multistate: INFO
