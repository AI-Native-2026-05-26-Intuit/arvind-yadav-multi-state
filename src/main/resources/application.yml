spring:
  jpa:
    hibernate:
      ddl-auto: validate            # (1) NEVER 'update' or 'create' in this curriculum
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false             # (2) prevent the lazy-load-in-view anti-pattern
    show-sql: false                 # flip to true for local debugging only
  application:
    name: multistate-service
  profiles:
    default: local
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: ${DB_PASSWORD:devpass}
    hikari:
      maximum-pool-size: 5
  data:
    mongodb:
      uri: mongodb://localhost:27017/multistate      # (1) placeholder; tests inject via @ServiceConnection
      auto-index-creation: true                      # (2) create @Indexed indexes on startup
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 60000                             # (3) 60s TTL — short enough to bound staleness
      cache-null-values: false                        # (4) don't cache "not found"


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.uptimecrew.multistate: DEBUG     # turn up your own packages in local dev

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    # Testcontainers will inject a real URL at runtime; this is just a placeholder
    # so the bean wiring doesn't fail in test contexts that don't use a DB.
    url: jdbc:postgresql://placeholder:5432/test
    username: test
    password: test

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: INFO
    com.uptimecrew.multistate: INFO
