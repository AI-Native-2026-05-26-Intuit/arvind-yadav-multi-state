# Reusable workflow: build + Trivy + push to ECR via OIDC.
# Called from ci.yml on main; never invoked directly by a UI dispatch.
#
# Repo-layout note: in this repo the multistate-api module IS the root
# (Gradle build + src/ live at the root). The course spec's context path
# uses ./${{ inputs.app-name }}; mapped here to . (repo root).
name: _build-and-push

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      image-name:
        required: true
        type: string
      ecr-repo:
        required: true
        type: string

# No permissions block here — the caller's job-level block is what gets
# applied. Documenting that with a comment so the next reader knows.

env:
  AWS_REGION:  us-east-1
  AWS_ACCOUNT: "279566174801"

jobs:
  build-scan-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: dev
    concurrency:
      group: build-push-${{ inputs.app-name }}
      cancel-in-progress: false
    steps:
      # Reusable workflow jobs start on a clean runner — checkout before local actions.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up build env (composite)
        uses: ./.github/actions/setup-build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d  # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/multistate-api-build-push
          aws-region:     ${{ env.AWS_REGION }}
          role-session-name: gh-${{ github.run_id }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64  # v2.1.6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db  # v3.6.1

      - name: Build image (load to local docker for scan)
        id: build-local
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85  # v6.7.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ inputs.image-name }}:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ inputs.image-name }}:${{ github.sha }}
          severity:  HIGH,CRITICAL
          ignore-unfixed: true
          scanners:       vuln
          exit-code: 1
          trivyignores:   .trivyignore

      - name: Push image to ECR (SHA tag + main tag)
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85  # v6.7.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ inputs.ecr-repo }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ inputs.ecr-repo }}:main
          build-args: |
            APP_VERSION=${{ github.sha }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
