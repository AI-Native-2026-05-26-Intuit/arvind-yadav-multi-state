name: observability

on:
  pull_request:
    paths:
      - 'slo/**'
      - 'manifests/observability/**'
      - 'scripts/observability-*.sh'
      - '.grafana/**'
      - 'src/**'
      - 'build.gradle'
      - '.github/workflows/observability.yml'

permissions:
  contents: read

env:
  K3D_VERSION: v5.8.3
  SLOTH_IMAGE: ghcr.io/slok/sloth:v0.11.0
  PROM_IMAGE: prom/prometheus:v2.54.0

jobs:
  static-checks:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Sloth generate (drift gate)
        run: |
          docker run --rm -v "${PWD}:/work" -w /work "${SLOTH_IMAGE}" \
            generate -i slo/multistate-api.sloth.yaml \
            -o manifests/observability/multistate-api-prometheusrule.yaml
          git diff --exit-code -- manifests/observability/multistate-api-prometheusrule.yaml

      - name: promtool check rules
        run: |
          docker run --rm --entrypoint promtool \
            -v "${PWD}:/work" -w /work "${PROM_IMAGE}" \
            check rules manifests/observability/multistate-api-prometheusrule.yaml

      - name: Grafana dashboard JSON sanity
        run: |
          jq -e '.schemaVersion == 39
            and .uid == "multistate-red-v1"
            and (.panels | length) == 4' \
            .grafana/dashboards/multistate-api-red.json

  k3d-smoke:
    needs: static-checks
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build multistate-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: uptimecrew/multistate-api:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}
            GIT_SHA=${{ github.sha }}

      - name: Install k3d
        run: |
          curl -fsSL \
            "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64" \
            -o /usr/local/bin/k3d
          chmod +x /usr/local/bin/k3d

      - name: Create k3d cluster
        run: |
          k3d cluster create multistate-obs-ci \
            --servers 1 --agents 1 \
            --wait

      - name: Import image
        run: k3d image import uptimecrew/multistate-api:${{ github.sha }} -c multistate-obs-ci

      - name: Deploy backing services + app
        run: |
          sed -i "s|uptimecrew/multistate-api:0.1.1|uptimecrew/multistate-api:${{ github.sha }}|g" \
            manifests/10-multistate-api.deployment.yaml
          kubectl apply -f manifests/00-namespace.yaml
          kubectl create secret generic multistate-api-secrets \
            -n multistate-dev \
            --from-literal=SPRING_DATASOURCE_PASSWORD=ci-dev-only-password \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap postgres-init-sql \
            -n multistate-dev \
            --from-file=db/V1__schema.sql \
            --from-file=db/V2__seed.sql \
            --from-file=db/V3__event_outbox.sql \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f .github/k8s/ci-backing-services.yaml
          kubectl wait --for=condition=available deployment/postgres -n multistate-dev --timeout=180s
          kubectl wait --for=condition=available deployment/redis -n multistate-dev --timeout=120s
          kubectl wait --for=condition=ready pod -l app=mongo -n multistate-dev --timeout=180s
          kubectl apply -f manifests/30-multistate-api.configmap.yaml
          kubectl apply -f manifests/10-multistate-api.deployment.yaml
          kubectl apply -f manifests/20-multistate-api.service.yaml
          kubectl patch configmap multistate-api-config -n multistate-dev --type merge -p '{
            "data": {
              "SPRING_MONGODB_URI": "mongodb://mongo.multistate-dev.svc.cluster.local:27017/statetrack",
              "OTEL_SDK_DISABLED": "true",
              "SPRING_KAFKA_LISTENER_AUTO_STARTUP": "false",
              "MANAGEMENT_HEALTH_KAFKA_ENABLED": "false"
            }
          }'
          kubectl rollout restart deploy/multistate-api -n multistate-dev
          kubectl rollout status deploy/multistate-api -n multistate-dev --timeout=8m

      - name: Observability smoke (actuator fallback without PLG stack)
        env:
          OBS_SMOKE_REQUIRE_PLG: "false"
          OBS_SMOKE_WAIT_SEC: "15"
        run: |
          chmod +x scripts/observability-smoke.sh
          ./scripts/observability-smoke.sh

      - name: Upload diagnostics on failure
        if: failure()
        run: |
          docker run --rm -v "${PWD}:/work" -w /work "${SLOTH_IMAGE}" \
            generate -i slo/multistate-api.sloth.yaml \
            -o /work/sloth-regen.yaml || true
          git diff -- manifests/observability/multistate-api-prometheusrule.yaml sloth-regen.yaml \
            > sloth-drift.diff || true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: observability-ci-diagnostics
          path: |
            /tmp/observability-smoke-*.log
            sloth-drift.diff
          if-no-files-found: ignore
          retention-days: 7

      - name: Delete k3d cluster
        if: always()
        run: k3d cluster delete multistate-obs-ci || true
