# .github/workflows/serverless.yml
name: multistate-tenant-lookup serverless

on:
  pull_request:
    paths:
      - 'template.yaml'
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'Makefile'
      - 'events/**'
      - 'env.ci.json'
      - 'scripts/sam-*.sh'
      - '.github/workflows/serverless.yml'
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  validate-build-test:
    # Native arm64 matches template Architectures: [arm64] — avoids QEMU timeouts on sam local invoke.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: sam validate --lint
        run: sam validate --lint

      - name: Gradle test (lambda unit tests)
        run: ./gradlew tenantLookupJar test --tests 'com.uptimecrew.multi_state.lambda.*'

      - name: sam build
        # Gradle + Makefile unpack the fat JAR. CI uses a longer timeout for JVM cold start.
        run: sam build --parameter-overrides LambdaTimeout=30

      - name: Start DynamoDB Local for sam local invoke
        env:
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          docker network create sam-ci || true
          docker rm -f dynamodb-local 2>/dev/null || true
          docker run -d --name dynamodb-local --network sam-ci \
            -p 8000:8000 amazon/dynamodb-local
          for i in $(seq 1 30); do
            if aws dynamodb list-tables \
                --endpoint-url http://localhost:8000 \
                --region us-east-1 >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          aws dynamodb create-table \
            --table-name tenants-dev \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://localhost:8000 \
            --region us-east-1
          aws dynamodb put-item \
            --table-name tenants-dev \
            --endpoint-url http://localhost:8000 \
            --region us-east-1 \
            --item '{"id":{"S":"tnt_synth_001"},"legalName":{"S":"tenant-synth.example.internal"},"primaryState":{"S":"CA"},"status":{"S":"ACTIVE"},"capturedAt":{"S":"2026-07-03T00:00:00Z"},"totalAllocated":{"N":"12500.00"}}'
          aws dynamodb wait table-exists \
            --table-name tenants-dev \
            --endpoint-url http://localhost:8000 \
            --region us-east-1
          aws dynamodb get-item \
            --table-name tenants-dev \
            --endpoint-url http://localhost:8000 \
            --region us-east-1 \
            --key '{"id":{"S":"tnt_synth_001"}}' \
            --query 'Item.id.S' --output text

      - name: sam local invoke (integration test against handler)
        run: |
          sam local invoke TenantLookupFunction \
              --event events/get-tenant.json \
              --env-vars env.ci.json \
              --docker-network sam-ci \
              --parameter-overrides StageName=dev DynamoDbEndpointUrl=http://dynamodb-local:8000 \
              | tee /tmp/local-invoke.json
          grep -q '"statusCode": 200' /tmp/local-invoke.json
          grep -q 'tnt_synth_001' /tmp/local-invoke.json

      - name: Upload sam build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sam-build
          path: .aws-sam
          retention-days: 7

  deploy-sandbox:
    needs: validate-build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    environment: sandbox
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: .aws-sam

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: sam deploy (sandbox)
        env:
          STACK: multistate-lambda-sandbox
          STAGE: dev
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          sam deploy \
              --no-confirm-changeset \
              --no-fail-on-empty-changeset \
              --stack-name "${STACK}" \
              --parameter-overrides "StageName=${STAGE}" \
              --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
              --resolve-s3

      - name: Smoke test (curl + CloudWatch REPORT check)
        env:
          STACK: multistate-lambda-sandbox
          STAGE: dev
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: ./scripts/sam-smoke.sh

      - name: Capture function diagnostics on failure
        if: failure()
        env:
          STACK: multistate-lambda-sandbox
          STAGE: dev
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws cloudformation describe-stack-events \
              --stack-name "${STACK}" \
              --region "${AWS_REGION}" \
              --max-items 50 > /tmp/stack-events.json || true
          aws logs tail "/aws/lambda/multistate-tenant-lookup-${STAGE}" \
              --since 10m --region "${AWS_REGION}" \
              > /tmp/lambda-logs.txt || true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: sam-diagnostics
          path: |
            /tmp/stack-events.json
            /tmp/lambda-logs.txt
          retention-days: 14
