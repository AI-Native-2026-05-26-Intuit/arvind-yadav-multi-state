# .github/workflows/k8s-ci.yml
#
# Repo-layout note: in this repo the multistate-api module IS the repository
# root (Gradle build + src/ live at the root; multistate-web/ is the frontend).
# So the Docker build context is "." and the Dockerfile is ./Dockerfile, rather
# than the ./multistate-api/ paths in the course reference.
name: multistate-api k8s-ci

on:
  pull_request:
    paths:
      - 'manifests/**'
      - 'scripts/k8s-*.sh'
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/k8s-ci.yml'
      - '.github/k8s/**'

permissions:
  contents: read

env:
  K3D_VERSION: v5.8.3

jobs:
  manifests-validate-and-deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      # ----- 1. Static validation (no cluster yet) -------------------
      - name: Install kubeconform
        run: |
          curl -sSL \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: kubeconform core manifests (W5 D3 app stack)
        run: kubeconform -strict -summary -schema-location default manifests/*.yaml

      # ----- 2. Spin up k3d ------------------------------------------
      - uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db  # v3.6.1

      - name: Build multistate-api image
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85  # v6.7.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: uptimecrew/multistate-api:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}
            GIT_SHA=${{ github.sha }}

      - name: Install k3d
        # AbsaOSS/k3d-action@v2 install.sh hits raw.githubusercontent.com 404/503
        # on GitHub-hosted runners; fetch the release binary directly instead.
        run: |
          curl -fsSL \
            "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64" \
            -o /usr/local/bin/k3d
          chmod +x /usr/local/bin/k3d
          k3d version

      - name: Create k3d cluster
        run: |
          k3d cluster create multistate-ci \
            --servers 1 --agents 2 \
            --port "8080:80@loadbalancer" \
            --k3s-arg "--disable=traefik@server:0" \
            --wait \
            --kubeconfig-update-default \
            --kubeconfig-switch-context
          k3d kubeconfig merge multistate-ci \
            --kubeconfig-merge-default \
            --kubeconfig-switch-context
          kubectl config current-context
          kubectl cluster-info --request-timeout=60s
          kubectl get nodes -o wide

      - name: Import image into the cluster
        run: k3d image import uptimecrew/multistate-api:${{ github.sha }} -c multistate-ci

      - name: Patch image tag in Deployment manifest
        run: |
          sed -i "s|uptimecrew/multistate-api:0.1.1|uptimecrew/multistate-api:${{ github.sha }}|g" \
            manifests/10-multistate-api.deployment.yaml

      # ----- 3. Namespace, secret, backing services ------------------
      - name: Apply namespace
        run: kubectl apply -f manifests/00-namespace.yaml

      - name: Seed Secret from CI value (NOT from the committed placeholder)
        run: |
          kubectl create secret generic multistate-api-secrets \
            -n multistate-dev \
            --from-literal=SPRING_DATASOURCE_PASSWORD="${CI_PG_PASSWORD:-ci-dev-only-password}" \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          CI_PG_PASSWORD: ${{ secrets.CI_PG_PASSWORD }}

      - name: Create postgres init ConfigMap
        run: |
          kubectl create configmap postgres-init-sql \
            -n multistate-dev \
            --from-file=db/V1__schema.sql \
            --from-file=db/V2__seed.sql \
            --from-file=db/V3__event_outbox.sql \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy CI backing services
        run: kubectl apply -f .github/k8s/ci-backing-services.yaml

      - name: Wait for backing services
        run: |
          kubectl wait --for=condition=available deployment/postgres -n multistate-dev --timeout=180s
          kubectl wait --for=condition=available deployment/redis -n multistate-dev --timeout=120s
          kubectl wait --for=condition=ready pod -l app=mongo -n multistate-dev --timeout=180s
          kubectl wait --for=condition=available deployment/kafka -n multistate-dev --timeout=180s

      - name: Install ingress-nginx
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.3/deploy/static/provider/cloud/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=180s
          # k3d routes :80@loadbalancer to the ingress-nginx LB service.
          kubectl wait --namespace ingress-nginx \
            --for=jsonpath='{.status.loadBalancer.ingress}' \
            service/ingress-nginx-controller --timeout=120s

      # ----- 4. Server-side admission + apply ------------------------
      - name: Server-side dry-run
        run: |
          for f in manifests/[0-9]*.yaml; do
            kubectl apply -f "$f" --dry-run=server
          done

      - name: Apply application manifests
        run: |
          for f in manifests/[0-9]*.yaml; do
            kubectl apply -f "$f"
          done

      - name: Re-seed Secret (overwrite committed placeholder from apply)
        run: |
          kubectl create secret generic multistate-api-secrets \
            -n multistate-dev \
            --from-literal=SPRING_DATASOURCE_PASSWORD="${CI_PG_PASSWORD:-ci-dev-only-password}" \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          CI_PG_PASSWORD: ${{ secrets.CI_PG_PASSWORD }}

      - name: Patch ConfigMap for CI runtime deps
        run: |
          kubectl patch configmap multistate-api-config -n multistate-dev --type merge -p '{
            "data": {
              "SPRING_MONGODB_URI": "mongodb://mongo.multistate-dev.svc.cluster.local:27017/statetrack",
              "OTEL_SDK_DISABLED": "true",
              "SPRING_KAFKA_LISTENER_AUTO_STARTUP": "false",
              "MANAGEMENT_HEALTH_KAFKA_ENABLED": "false"
            }
          }'
          kubectl rollout restart deploy/multistate-api -n multistate-dev

      - name: Wait for rollout (gates the build)
        run: |
          kubectl rollout status \
            deploy/multistate-api -n multistate-dev --timeout=8m

      # HPA (minReplicas: 2) fights a single-replica smoke run and scales pods
      # while ingress-nginx is programming upstreams → transient HTTP 503.
      - name: Stabilise for Ingress smoke
        run: |
          kubectl delete hpa/multistate-api -n multistate-dev --ignore-not-found
          kubectl scale deploy/multistate-api -n multistate-dev --replicas=1
          kubectl rollout status deploy/multistate-api -n multistate-dev --timeout=5m

      # ----- 5. Smoke ------------------------------------------------
      - name: Smoke test through the Ingress
        run: ./scripts/k8s-smoke.sh

      # ----- 6. Diagnostics on failure -------------------------------
      - name: Capture diagnostics on failure
        if: failure()
        run: |
          k3d kubeconfig merge multistate-ci \
            --kubeconfig-merge-default \
            --kubeconfig-switch-context || true
          kubectl cluster-info || true
          kubectl get all -n multistate-dev || true
          kubectl describe deploy/multistate-api -n multistate-dev
          kubectl describe pod -n multistate-dev -l app.kubernetes.io/name=multistate-api
          kubectl logs deploy/multistate-api -n multistate-dev \
            --tail=200 > pod-logs.txt || true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: failure()
        with:
          name: k8s-diagnostics
          path: pod-logs.txt
          retention-days: 14

      - name: Delete k3d cluster
        if: always()
        run: k3d cluster delete multistate-ci || true
