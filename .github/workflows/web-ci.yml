name: multistate-web CI

on:
  pull_request:
    paths:
      - 'multistate-web/**'
      - '.github/workflows/web-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: multistate-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'multistate-web/pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      # Playwright browsers are needed by `pnpm check` (e2e step).
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      # Single CI entrypoint per W4 D5 Task 4.
      - run: pnpm check
      - run: pnpm run build
