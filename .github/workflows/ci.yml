# .github/workflows/ci.yml
#
# Repo-layout note: in this repo the multistate-api module IS the root
# (Gradle build + src/ live at the root; multistate-web/ is the W4 React
# frontend, with its own CI workflow). The course spec's working-directory
# and artifact paths use multistate-api/; mapped here to the repo root.
name: multistate-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PR force-pushes cancel stale runs; main pushes serialise via the
# ci-${{ github.ref }} concurrency group below.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Top-level default: read-only. Individual jobs widen as needed.
permissions:
  contents: read

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      # Local composite actions require checkout before GitHub can load action.yml.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up build env (composite)
        uses: ./.github/actions/setup-build

      - name: Gradle build + tests
        run: ./gradlew --no-daemon clean build

      - name: Ban HINCRBYFLOAT in cost package
        run: |
          if grep -RIn "hincrByFloat\|HINCRBYFLOAT" \
              src/main/java/com/uptimecrew/multistate/llmproxy/cost/; then
            echo "HINCRBYFLOAT is banned in the cost package"
            exit 1
          fi
          if grep -RIn "doubleValue()" \
              src/main/java/com/uptimecrew/multistate/llmproxy/cost/ \
              | grep -i cost; then
            echo "doubleValue() on cost* BigDecimal is banned"
            exit 1
          fi

      - name: Ban Math.random in embeddings integration test
        run: |
          if grep -RIn "Math\.random\|new Random" \
              src/test/java/com/uptimecrew/multistate/embeddings/; then
            echo "Math.random / Random banned in embeddings tests"
            exit 1
          fi

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: multistate-api-test-reports
          path: build/reports/tests/
          retention-days: 7

  call-build-and-push:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: build-test
    uses: ./.github/workflows/_build-and-push.yml
    with:
      app-name:   multistate-api
      image-name: uptimecrew/multistate-api
      ecr-repo:   uptimecrew/multistate-api
    permissions:
      contents: read
      id-token:  write     # required to mint the OIDC token for AWS STS (Task 3)

  call-bump-config:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: call-build-and-push
    uses: ./.github/workflows/_bump-config.yml
    with:
      image-name: uptimecrew/multistate-api
      image-sha:  ${{ github.sha }}
    secrets:
      GITOPS_REPO_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
    permissions:
      contents: read
