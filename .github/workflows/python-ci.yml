# .github/workflows/python-ci.yml
# Runs on PRs that touch the multistate-ai/ subtree.
name: multistate-ai-ci

on:
  push:
    branches: [main]
    paths:
      - "multistate-ai/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "multistate-ai/**"
      - ".github/workflows/python-ci.yml"

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  python-quality-gate:
    name: uv sync + ruff + mypy + pytest + W7D2 gates
    runs-on: ubuntu-24.04
    # W7 D2 adds Testcontainers + optional LLM-backed RAGAS; keep headroom.
    timeout-minutes: 60
    defaults:
      run:
        working-directory: multistate-ai
    env:
      # Rancher/local and GHA both prefer Ryuk off for socket-mount quirks.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4.1.7

      - name: Install uv (pinned)
        uses: astral-sh/setup-uv@b75a909f75acd358c2196fb9a5f1299a9a8868a4  # v3.1.7
        with:
          version: "0.4.18"
          enable-cache: true

      - name: Pin Python 3.12 via uv
        run: uv python install 3.12

      - name: uv sync --frozen (fail on lockfile drift)
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check

      - name: ruff format --check
        run: uv run ruff format --check

      - name: mypy --strict
        run: uv run mypy src/ tests/

      - name: pytest with coverage (exclude slow LLM gates)
        run: uv run pytest -v -m 'not slow' --cov=src --cov-fail-under=85

      # ----- New W7 D2 steps -----

      - name: Great Expectations doc_chunks_v1 suite (Testcontainers)
        run: uv run pytest -v -k 'test_doc_chunks_suite_passes'
        env:
          LANGSMITH_API_KEY: ${{ secrets.MULTISTATE_AI_LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: multistate-ai-dev-ci
          LANGSMITH_TRACING: "true"

      - name: RAGAS golden-set thresholds
        run: uv run pytest -v -k 'test_ragas_baseline_thresholds' --tb=short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.MULTISTATE_AI_ANTHROPIC_API_KEY }}
          MULTISTATE_AI_ANTHROPIC_API_KEY: ${{ secrets.MULTISTATE_AI_ANTHROPIC_API_KEY }}
          # Live Anthropic evaluator (retired 3.5 haiku IDs 404).
          MULTISTATE_AI_RAGAS_MODEL: claude-haiku-4-5-20251001
          # RAGAS uses LangChain directly; LangSmith tracing is validated in the next step.
          LANGSMITH_TRACING: "false"
          HF_HUB_DISABLE_TELEMETRY: "1"

      - name: Assert LangSmith run uploaded for a sample request
        run: uv run python -m multistate_ai.scripts.assert_langsmith_run_visible
        env:
          LANGSMITH_API_KEY: ${{ secrets.MULTISTATE_AI_LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: multistate-ai-dev-ci
          LANGSMITH_TRACING: "true"

      # ----- New W7 D3 steps -----

      - name: Tenant isolation (Testcontainers pgvector)
        run: uv run pytest -v -k 'test_tenant_isolation'
        env:
          LANGSMITH_API_KEY: ${{ secrets.MULTISTATE_AI_LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: multistate-ai-dev-ci
          LANGSMITH_TRACING: "true"

      - name: RAGAS faithfulness >= 0.85 gate
        run: uv run pytest -v -k 'test_ragas_faithfulness_gate'
        env:
          LANGSMITH_API_KEY: ${{ secrets.MULTISTATE_AI_LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: multistate-ai-dev-ci
          LANGSMITH_TRACING: "false"
          ANTHROPIC_API_KEY: ${{ secrets.MULTISTATE_AI_ANTHROPIC_API_KEY }}
          MULTISTATE_AI_ANTHROPIC_API_KEY: ${{ secrets.MULTISTATE_AI_ANTHROPIC_API_KEY }}
          MULTISTATE_AI_RAGAS_MODEL: claude-haiku-4-5-20251001
          HF_HUB_DISABLE_TELEMETRY: "1"

      - name: Semantic cache + tenant-key smoke test
        run: uv run pytest -v -k 'test_semantic_cache'

      - name: Airflow DAG import check
        run: uv run python -c "from multistate_ai.dags.rag_svc_ingest import multistate_ai_ingest_dag"
