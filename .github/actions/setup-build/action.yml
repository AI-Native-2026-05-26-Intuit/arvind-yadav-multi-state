# Composite action: checkout + setup-java + Gradle cache restore.
# Used by every job that compiles Java. One place to bump JDK or cache key.
name: setup-build
description: Check out the repo, install Temurin 21, restore Gradle cache.

runs:
  using: composite
  steps:
    - name: Check out source
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      with:
        fetch-depth: 1

    - name: Set up JDK 21
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
      with:
        distribution: temurin
        java-version: '21'
        cache: gradle
