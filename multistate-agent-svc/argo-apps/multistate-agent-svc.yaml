# multistate-agent-svc/argo-apps/multistate-agent-svc.yaml
# Argo CD Application reconciling agent-svc into the cluster.
# Adapted to the trainee config repo + multistate AppProject (W6 D2).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multistate-agent-svc
  namespace: argocd
  labels:
    team: multistate
    component: agent-svc
spec:
  project: multistate
  source:
    repoURL: https://github.com/AI-Native-2026-05-26-Intuit/arvind-yadav-multistate-config.git
    targetRevision: main
    path: overlays/agent-svc
  destination:
    server: https://kubernetes.default.svc
    namespace: multistate-svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
