# cfn/multistate-app-dev.yaml
# TASK 3 application stack: an RDS PostgreSQL instance + parameter
# group + a Secrets Manager secret holding the master credentials.
# Consumes the network stack's exports via !ImportValue. The DB
# master password is NEVER passed as a Parameter (NoEcho or not --
# see Section 9 sticking point); it lives in Secrets Manager and is
# resolved at deploy time via the {{resolve:secretsmanager:...}}
# dynamic reference. Stateful resources carry BOTH DeletionPolicy:
# Retain AND UpdateReplacePolicy: Retain.
AWSTemplateFormatVersion: "2010-09-09"
Description: multistate application stack -- RDS + Secrets Manager.

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  NetworkStackName:
    Type: String
    Default: multistate-network-dev
    Description: Name of the network stack whose exports we !ImportValue.
  DbInstanceClass:
    Type: String
    Default: db.t4g.small
    AllowedValues: [db.t4g.small, db.t4g.medium, db.m6g.large]

Resources:
  DbMasterSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W77
            reason: "Using aws/secretsmanager managed key is sufficient for dev; cross-account sharing not required."
    Properties:
      Name:        multistate/dev/db-master
      Description: !Sub "multistate DB master credentials, ${EnvName}."
      GenerateSecretString:
        SecretStringTemplate: '{"username": "multistate_master"}'
        GenerateStringKey:    password
        ExcludeCharacters:    '"@/\\'
        PasswordLength:       32
      Tags:
        - {Key: Env,         Value: !Ref EnvName}
        - {Key: Project,     Value: multistate}
        - {Key: environment, Value: !Ref EnvName}
        - {Key: trainee,     Value: arvind_yadav}
        - {Key: team,        Value: multistate}

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "multistate ${EnvName} private subnets"
      SubnetIds:
        !Split
          - ","
          - !ImportValue
            "Fn::Sub": "${NetworkStackName}-PrivateSubnets"
      Tags:
        - {Key: Env,         Value: !Ref EnvName}
        - {Key: Project,     Value: multistate}
        - {Key: environment, Value: !Ref EnvName}
        - {Key: trainee,     Value: arvind_yadav}
        - {Key: team,        Value: multistate}

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "multistate ${EnvName} DB SG (5432 from app SG only)."
      VpcId:
        !ImportValue
          "Fn::Sub": "${NetworkStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol:             tcp
          FromPort:               5432
          ToPort:                 5432
          SourceSecurityGroupId:
            !ImportValue
              "Fn::Sub": "${NetworkStackName}-AppSgId"
          Description: Postgres from app SG only.
      # Explicit egress: RDS requires no outbound; SGs are stateful so
      # response traffic to established inbound connections is allowed.
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp:     "127.0.0.1/32"
          Description: DB tier has no required outbound; loopback-only makes deny-all explicit.
      Tags:
        - {Key: Name,        Value: !Sub "multistate-${EnvName}-db-sg"}
        - {Key: Env,         Value: !Ref EnvName}
        - {Key: Project,     Value: multistate}
        - {Key: environment, Value: !Ref EnvName}
        - {Key: trainee,     Value: arvind_yadav}
        - {Key: team,        Value: multistate}

  DbInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Explicit identifier required for Secrets Manager SecretTargetAttachment and operational clarity."
    Properties:
      DBInstanceIdentifier:  !Sub "multistate-${EnvName}"
      Engine:                postgres
      EngineVersion:         "16.3"
      DBInstanceClass:       !Ref DbInstanceClass
      AllocatedStorage:      "20"
      StorageType:           gp3
      StorageEncrypted:      true
      DBSubnetGroupName:     !Ref DbSubnetGroup
      VPCSecurityGroups:     [!Ref DbSecurityGroup]
      PubliclyAccessible:    false
      MultiAZ:               false
      BackupRetentionPeriod: 7
      DeletionProtection:    true
      MasterUsername: "{{resolve:secretsmanager:multistate/dev/db-master:SecretString:username}}"
      MasterUserPassword: "{{resolve:secretsmanager:multistate/dev/db-master:SecretString:password}}"
      Tags:
        - {Key: Env,         Value: !Ref EnvName}
        - {Key: Project,     Value: multistate}
        - {Key: environment, Value: !Ref EnvName}
        - {Key: trainee,     Value: arvind_yadav}
        - {Key: team,        Value: multistate}

  SecretTargetAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId:   !Ref DbMasterSecret
      TargetId:   !Ref DbInstance
      TargetType: AWS::RDS::DBInstance

Outputs:
  DbEndpoint:
    Value: !GetAtt DbInstance.Endpoint.Address
    Export: {Name: !Sub "${AWS::StackName}-DbEndpoint"}
  DbSecretArn:
    Value: !Ref DbMasterSecret
    Export: {Name: !Sub "${AWS::StackName}-DbSecretArn"}
