# compose.override.yaml - local-dev tweaks. Auto-merged by Compose v2 when
# present alongside compose.yaml, but the only service declared here is
# gated under `profiles: [dev]` so a bare `docker compose up` is unaffected;
# only `docker compose --profile dev up` activates this.
#
# Why nothing else? Earlier iterations of this file modified the base
# `multistate-api` service with JDWP env, SPRING_PROFILES_ACTIVE=dev and
# host-published ports. That made `docker compose up` (no profile) on
# the CI runner behave differently from a clean stack and triggered a
# Spring Boot property-resolution edge case. Keeping the override scoped
# to a profile-gated service means engineers opt in explicitly and CI
# is never affected.

services:
  # Live-reload dev container. Run with: docker compose --profile dev up multistate-api-dev
  # Terminal 1 (host): ./gradlew bootJar --continuous
  # This bind-mounts the repo root and re-execs the freshly-built JAR.
  #
  # Repo-layout note: this repo is single-module
  # (rootProject.name = 'multistate'), so the bind source is the repo
  # root and the JAR glob is `build/libs/multistate-*.jar`.
  multistate-api-dev:
    profiles: [dev]
    image: eclipse-temurin:21-jre-jammy
    networks: [multistate_net]
    working_dir: /workspace
    command:
      - "sh"
      - "-c"
      - |
        java -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005 \
             -Dspring.devtools.restart.poll-interval=1s \
             -Dspring.devtools.restart.quiet-period=400ms \
             -jar build/libs/multistate-*.jar
    ports:
      - "8081:8080"   # coexists with the prod-mode :8080
      - "5006:5005"   # JDWP attach
    env_file:
      - ./envs/multistate.env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/multistate_dev
      SPRING_DATASOURCE_USERNAME: multistate_dev
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MONGO_URI: mongodb://mongo:27017/multistate
      SPRING_CONFIG_IMPORT: "configtree:/run/secrets/"
    secrets:
      - source: pg_password
        target: spring.datasource.password
    volumes:
      - type: bind
        source: .
        target: /workspace
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_healthy }
      mongo:    { condition: service_healthy }
