# manifests/40-multistate-api.secret.yaml - secret env.
# Use `stringData` (plaintext input; Kubernetes base64-encodes for you)
# NOT `data` (hand-base64). The placeholder value is replaced in CI by
# a value pulled from a real secrets manager (External Secrets Operator
# in prod; kubectl-create from a CI secret here).
#
# This file MUST NOT contain a real password. Engineers regenerate
# locally via:
#   kubectl create secret generic multistate-api-secrets \
#     --from-literal=SPRING_DATASOURCE_PASSWORD=$(pwgen -s 24 1) \
#     -n multistate-dev --dry-run=client -o yaml \
#     > manifests/40-multistate-api.secret.local.yaml
# and apply the .local copy (gitignored).

apiVersion: v1
kind: Secret
metadata:
  name: multistate-api-secrets
  namespace: multistate-dev
  labels:
    app.kubernetes.io/name: multistate-api
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: replace-at-apply-time-from-secrets-manager
