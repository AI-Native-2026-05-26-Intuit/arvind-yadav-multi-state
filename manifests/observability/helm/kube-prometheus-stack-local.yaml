# Local k3d / Rancher Desktop: pin images to versions pre-imported by
# scripts/observability-plg-install.sh (cluster cannot pull from registries).
grafana:
  image:
    registry: docker.io
    repository: grafana/grafana
    tag: "11.2.0"
  sidecar:
    image:
      registry: quay.io
      repository: kiwigrid/k8s-sidecar
      tag: "2.8.1"

prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false
  image:
    registry: quay.io
    repository: prometheus-operator/prometheus-operator
    tag: v0.77.2
  prometheusConfigReloader:
    image:
      registry: quay.io
      repository: prometheus-operator/prometheus-config-reloader
      tag: v0.77.2

prometheus-node-exporter:
  image:
    registry: quay.io
    repository: prometheus/node-exporter
    tag: v1.8.2
    distroless: false

kube-state-metrics:
  image:
    registry: registry.k8s.io
    repository: kube-state-metrics/kube-state-metrics
    tag: v2.13.0

prometheus:
  prometheusSpec:
    image:
      registry: quay.io
      repository: prometheus/prometheus
      tag: v2.54.1

alertmanager:
  alertmanagerSpec:
    image:
      registry: quay.io
      repository: prometheus/alertmanager
      tag: v0.27.0
