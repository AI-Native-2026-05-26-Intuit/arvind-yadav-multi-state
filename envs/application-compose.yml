# Compose-time overrides layered on top of the in-jar application.yml.
# Activated via `--spring.config.additional-location=file:/config/application-compose.yml`
# (set as a Spring Boot CLI arg on the multistate-api service in compose.yaml).
#
# Why a file overlay instead of env vars?
#
# Spring Boot 4 + Spring Data MongoDB 5.x exhibits a property-resolution
# quirk we couldn't shake from env vars alone: SPRING_DATA_MONGODB_URI
# set in the container env (verified via `docker inspect`) did NOT
# displace the in-jar application.yml's
#   spring.data.mongodb.uri: mongodb://localhost:27017/multistate
# Same outcome when passed as -Dspring.data.mongodb.uri=... via
# JAVA_TOOL_OPTIONS. Theoretically env vars > JVM properties > YAML;
# in practice the YAML kept winning for this one key.
#
# A `spring.config.additional-location` file is layered ABOVE the in-jar
# application.yml in the ConfigData source ordering (different mechanism
# from env-var binding), so it overrides deterministically.
#
# Postgres password is NOT in this file. It comes from a Docker secret
# (compose.yaml `secrets:` block with target `spring.datasource.password`)
# loaded via `SPRING_CONFIG_IMPORT=configtree:/run/secrets/`. Keeps this
# file safe to commit (no plaintext credentials).

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/multistate_dev
    username: multistate_dev
  data:
    mongodb:
      uri: mongodb://mongo:27017/multistate
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:9092

# Smoke-stack has no OTel collector (the observability profile in
# compose.profiles.yaml adds one). Disable the exporter to silence
# noisy "connection refused" logs against :4318.
otel:
  sdk:
    disabled: true
